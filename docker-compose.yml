services:
  freshrss:
    image: freshrss/freshrss:latest
    container_name: freshrss
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      TZ: Asia/Kolkata
      CRON_MIN: "*/1"
      RSS_LEADS_USER: ${FRESHRSS_USER:-invictine}
      RSS_LEADS_LOCAL_LOCATIONS: ${RSS_LEADS_LOCAL_LOCATIONS:-}
    volumes:
      - freshrss_data:/var/www/FreshRSS/data
      - freshrss_extensions:/var/www/FreshRSS/extensions
      - ./extensions/RssLeadsStatus:/var/www/FreshRSS/extensions/RssLeadsStatus
      - ./feeds:/opt/rss-leads-stack/feeds:ro
      - ./scripts/lib:/opt/rss-leads-stack/scripts/lib:ro
      - ./freshrss-public/rss-leads-status.php:/var/www/FreshRSS/p/rss-leads-status.php
      - ./freshrss-public/rss-leads-ai.php:/var/www/FreshRSS/p/rss-leads-ai.php
      - ./freshrss-public/rss-leads-high-priority.php:/var/www/FreshRSS/p/rss-leads-high-priority.php
      - ./freshrss-public/rss-leads-location.php:/var/www/FreshRSS/p/rss-leads-location.php
      - ./freshrss-public/rss-leads-profile.php:/var/www/FreshRSS/p/rss-leads-profile.php
      - ./freshrss-public/rss-leads-reddit-comments.php:/var/www/FreshRSS/p/rss-leads-reddit-comments.php

  ai-filter:
    build:
      context: .
      dockerfile: Dockerfile.ai-filter
    image: rss-leads-ai-filter:latest
    container_name: rss-leads-ai-filter
    restart: unless-stopped
    depends_on:
      - freshrss
    environment:
      TZ: Asia/Kolkata
      FRESHRSS_USER: ${FRESHRSS_USER:-invictine}
      RSS_LEADS_USER: ${FRESHRSS_USER:-invictine}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-lite}
      GEMINI_MODELS: ${GEMINI_MODELS:-gemini-3.1-flash-lite,gemini-3-flash,gemma4b}
      AI_GEMMA_MODEL: ${AI_GEMMA_MODEL:-gemma4-31b}
      AI_REFINE_MODELS: ${AI_REFINE_MODELS:-gemini-3.1-flash-lite,gemini-3-flash}
      AI_PRIORITY_FIRST_PASS_MODEL: ${AI_PRIORITY_FIRST_PASS_MODEL:-gemma4-31b}
      AI_PRIORITY_SECOND_PASS_MODEL: ${AI_PRIORITY_SECOND_PASS_MODEL:-gemma4-31b}
      AI_PRIORITY_ARBITER_MODEL: ${AI_PRIORITY_ARBITER_MODEL:-gemini-3-flash}
      AI_PRIORITY_ARBITER_BATCH_SIZE: ${AI_PRIORITY_ARBITER_BATCH_SIZE:-20}
      AI_FILTER_ALLOW_MODEL_FALLBACKS: ${AI_FILTER_ALLOW_MODEL_FALLBACKS:-1}
      AI_FILTER_BATCH_SIZE: ${AI_FILTER_BATCH_SIZE:-20}
      AI_JOB_TYPE_OPTION_LIMIT: ${AI_JOB_TYPE_OPTION_LIMIT:-25}
      AI_GEMMA_FIRST_PASS_BATCH_SIZE: ${AI_GEMMA_FIRST_PASS_BATCH_SIZE:-1}
      AI_GEMMA_FIRST_PASS_REQUESTS_PER_RUN: ${AI_GEMMA_FIRST_PASS_REQUESTS_PER_RUN:-3}
      AI_FLASH_LITE_REFINE_BATCH_SIZE: ${AI_FLASH_LITE_REFINE_BATCH_SIZE:-4}
      AI_FILTER_CONTENT_CHARS: ${AI_FILTER_CONTENT_CHARS:-900}
      AI_FILTER_INTERVAL_SECONDS: ${AI_FILTER_INTERVAL_SECONDS:-20}
      AI_FILTER_LOOKBACK_DAYS: ${AI_FILTER_LOOKBACK_DAYS:-14}
      RSS_LEADS_HIGH_PRIORITY_KEEP_DAYS: ${RSS_LEADS_HIGH_PRIORITY_KEEP_DAYS:-7}
      RSS_LEADS_LOW_MEDIUM_MAX_ENTRIES: ${RSS_LEADS_LOW_MEDIUM_MAX_ENTRIES:-3000}
      RSS_LEADS_DELETE_NOT_HIRING_EOD: ${RSS_LEADS_DELETE_NOT_HIRING_EOD:-1}
      RSS_LEADS_LOCAL_LOCATIONS: ${RSS_LEADS_LOCAL_LOCATIONS:-}
      AI_FILTER_DAILY_REQUEST_BUDGET: ${AI_FILTER_DAILY_REQUEST_BUDGET:-0}
      AI_MODEL_DAILY_LIMITS: ${AI_MODEL_DAILY_LIMITS:-gemini-3.1-flash-lite=500,gemini-3-flash=20,gemma4-31b=1500}
      AI_FILTER_QUOTA_COOLDOWN_SECONDS: ${AI_FILTER_QUOTA_COOLDOWN_SECONDS:-21600}
      AI_BENCHMARK_LOW_INTELLIGENCE_MODELS: ${AI_BENCHMARK_LOW_INTELLIGENCE_MODELS:-gemma4-31b,gemini-3.1-flash-lite}
      AI_BENCHMARK_SAMPLE_SIZE: ${AI_BENCHMARK_SAMPLE_SIZE:-8}
      AI_BENCHMARK_HIGH_INTELLIGENCE_API_KEY: ${AI_BENCHMARK_HIGH_INTELLIGENCE_API_KEY:-}
      AI_BENCHMARK_HIGH_INTELLIGENCE_MODEL: ${AI_BENCHMARK_HIGH_INTELLIGENCE_MODEL:-gemini-3.1-pro-preview}
      AI_BENCHMARK_HIGH_INTELLIGENCE_AGENT: ${AI_BENCHMARK_HIGH_INTELLIGENCE_AGENT:-}
      AI_BENCHMARK_HIGH_INTELLIGENCE_PROVIDER: ${AI_BENCHMARK_HIGH_INTELLIGENCE_PROVIDER:-antigravity-sdk}
      AI_BENCHMARK_HIGH_INTELLIGENCE_FALLBACK_MODELS: ${AI_BENCHMARK_HIGH_INTELLIGENCE_FALLBACK_MODELS:-gemini-3.5-flash}
      AI_BENCHMARK_HIGH_INTELLIGENCE_SDK: ${AI_BENCHMARK_HIGH_INTELLIGENCE_SDK:-1}
      AI_BENCHMARK_HIGH_INTELLIGENCE_SDK_COMMAND: ${AI_BENCHMARK_HIGH_INTELLIGENCE_SDK_COMMAND:-}
      AI_BENCHMARK_HIGH_INTELLIGENCE_CLI: ${AI_BENCHMARK_HIGH_INTELLIGENCE_CLI:-}
      AI_BENCHMARK_ANTIGRAVITY_APP_DATA_DIR: ${AI_BENCHMARK_ANTIGRAVITY_APP_DATA_DIR:-/tmp/rss-leads-antigravity-app}
      AI_BENCHMARK_ANTIGRAVITY_SAVE_DIR: ${AI_BENCHMARK_ANTIGRAVITY_SAVE_DIR:-/tmp/rss-leads-antigravity-sessions}
      AI_BENCHMARK_ANTIGRAVITY_WORKSPACE: ${AI_BENCHMARK_ANTIGRAVITY_WORKSPACE:-/tmp}
    entrypoint:
      - /bin/sh
      - -c
      - |
        while true; do
          php /opt/rss-leads-stack/scripts/gemini-ai-filter.php || true;
          php /opt/rss-leads-stack/scripts/enforce-freshrss-retention.php || true;
          sleep "$${AI_FILTER_INTERVAL_SECONDS:-20}";
        done
    volumes:
      - freshrss_data:/var/www/FreshRSS/data
      - ./feeds:/opt/rss-leads-stack/feeds:ro
      - ./scripts/lib:/opt/rss-leads-stack/scripts/lib:ro
      - ./scripts/gemini-ai-filter.php:/opt/rss-leads-stack/scripts/gemini-ai-filter.php:ro
      - ./scripts/benchmark-ai-models.php:/opt/rss-leads-stack/scripts/benchmark-ai-models.php:ro
      - ./scripts/antigravity-high-intelligence-judge.py:/opt/rss-leads-stack/scripts/antigravity-high-intelligence-judge.py:ro
      - ./scripts/sync-freshrss-high-priority.php:/opt/rss-leads-stack/scripts/sync-freshrss-high-priority.php:ro
      - ./scripts/backfill-freshrss-ai-tags.php:/opt/rss-leads-stack/scripts/backfill-freshrss-ai-tags.php:ro
      - ./scripts/enforce-freshrss-retention.php:/opt/rss-leads-stack/scripts/enforce-freshrss-retention.php:ro

  rssbridge:
    image: rssbridge/rss-bridge:latest
    container_name: rssbridge
    restart: unless-stopped
    profiles:
      - rssbridge
    ports:
      - "8081:80"
    environment:
      TZ: Asia/Kolkata

volumes:
  freshrss_data:
  freshrss_extensions:
